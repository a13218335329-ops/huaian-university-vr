<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111714">
  <title>淮安大学 | 数字校园</title>
  <style>
    :root {
      color-scheme: dark;
      --bar: rgba(17, 23, 20, .92);
      --bar-soft: rgba(17, 23, 20, .78);
      --line: rgba(255, 255, 255, .16);
      --text: #f5f7f5;
      --muted: #bec7c1;
      --accent: #49b978;
      --danger: #f1b55a;
      font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #101512;
      color: var(--text);
    }

    button, a { font: inherit; }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      background: #101512;
    }

    .viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #101512;
    }

    .launch {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at 50% 35%, #274d37 0, #14231a 35%, #0c110e 100%);
    }

    .launch-content {
      width: min(460px, 100%);
      padding: 32px 28px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 8px;
      background: rgba(10, 15, 12, .72);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .launch-content h1 { margin: 0; font-size: 28px; }
    .launch-content p { margin: 12px 0 24px; color: var(--muted); line-height: 1.7; font-size: 14px; }

    .enter-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 22px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #082314;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .enter-button:hover { background: #5ed38d; }

    .chrome {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .app.ui-hidden .chrome {
      opacity: 0;
    }

    .app.ui-hidden .chrome * {
      pointer-events: none;
    }

    .topbar {
      min-height: 58px;
      padding: max(10px, env(safe-area-inset-top)) 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(to bottom, var(--bar), transparent);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
      pointer-events: auto;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
      border: 1px solid rgba(255, 255, 255, .25);
      background: rgba(4, 9, 6, .62);
      font-size: 17px;
      font-weight: 800;
    }

    .brand-copy { min-width: 0; }

    .brand-copy strong,
    .brand-copy span {
      display: block;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      letter-spacing: 0;
    }

    .brand-copy strong { font-size: 15px; }
    .brand-copy span { margin-top: 2px; color: var(--muted); font-size: 11px; }

    .tools {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bar-soft);
      color: var(--text);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      transition: background .15s ease, border-color .15s ease, transform .15s ease;
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      border-color: rgba(255, 255, 255, .42);
      background: rgba(32, 42, 36, .96);
      outline: none;
    }

    .icon-button:active { transform: scale(.96); }

    .status {
      position: absolute;
      left: 14px;
      bottom: max(14px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: calc(100% - 28px);
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bar-soft);
      color: var(--muted);
      font-size: 12px;
      pointer-events: auto;
      backdrop-filter: blur(10px);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      flex: 0 0 8px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(241, 181, 90, .15);
    }

    .status.ready .status-dot {
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(73, 185, 120, .16);
    }

    .status span:last-child {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .reveal-button {
      position: absolute;
      z-index: 8;
      top: max(12px, env(safe-area-inset-top));
      right: 12px;
      display: none;
    }

    .app.ui-hidden .reveal-button {
      display: grid;
      opacity: .35;
    }

    @media (max-width: 600px) {
      .topbar { padding-inline: 10px; }
      .brand-copy span { display: none; }
      .tools { gap: 6px; }
      .icon-button { width: 38px; height: 38px; }
      .status { left: 10px; bottom: max(10px, env(safe-area-inset-bottom)); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="launch" aria-label="淮安大学 VR 全景入口">
      <div class="launch-content">
        <h1>淮安大学</h1>
        <p>校园 360° 全景浏览</p>
        <a class="enter-button" id="enterViewer" href="https://vr.justeasy.cn/view/1i77k9o33n09m286-1781412008.html?sessionid=">进入全景</a>
      </div>
    </section>

    <div class="chrome" aria-label="网站工具栏">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">淮</div>
          <div class="brand-copy">
            <strong>淮安大学</strong>
            <span>数字校园全景</span>
          </div>
        </div>

        <nav class="tools" aria-label="全景工具">
          <button class="icon-button" id="reload" type="button" aria-label="刷新全景" title="刷新全景">↻</button>
          <a class="icon-button" href="https://vr.justeasy.cn/view/1i77k9o33n09m286-1781412008.html?sessionid=" target="_blank" rel="noopener" aria-label="在新窗口打开" title="在新窗口打开">↗</a>
          <button class="icon-button" id="hideUi" type="button" aria-label="隐藏工具栏" title="隐藏工具栏">−</button>
          <button class="icon-button" id="fullscreen" type="button" aria-label="全屏" title="全屏">⛶</button>
        </nav>
      </header>

      <div class="status" id="status" role="status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusText">正在载入全景</span>
      </div>
    </div>

    <button class="icon-button reveal-button" id="showUi" type="button" aria-label="显示工具栏" title="显示工具栏">☰</button>
  </main>

  <script>
    const app = document.getElementById('app');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const originalViewerUrl = document.getElementById('enterViewer').href;

    function setUiHidden(hidden) {
      app.classList.toggle('ui-hidden', hidden);
    }

    function reloadViewer() {
      status.classList.remove('ready');
      statusText.textContent = '正在打开全景';
      window.location.href = originalViewerUrl;
    }

    async function toggleFullscreen() {
      if (!document.fullscreenElement) {
        await app.requestFullscreen?.();
      } else {
        await document.exitFullscreen?.();
      }
    }

    status.classList.add('ready');
    statusText.textContent = '全景入口已准备';
    window.setTimeout(() => status.style.opacity = '.55', 1800);

    document.getElementById('reload').addEventListener('click', reloadViewer);
    document.getElementById('hideUi').addEventListener('click', () => setUiHidden(true));
    document.getElementById('showUi').addEventListener('click', () => setUiHidden(false));
    document.getElementById('fullscreen').addEventListener('click', toggleFullscreen);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') setUiHidden(false);
      if (event.key.toLowerCase() === 'h') setUiHidden(!app.classList.contains('ui-hidden'));
      if (event.key.toLowerCase() === 'r') reloadViewer();
      if (event.key.toLowerCase() === 'f') toggleFullscreen();
    });
  </script>
</body>
</html>
